<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craft Vegan Bakery Belgrano R</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#FAF8F4;
  --ink:#1C1A17;
  --mid:#6B6560;
  --rule:#D9D3CA;
  --gold:#C8A84B;
  --white:#FFFFFF;
}

html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;
  z-index:100;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:22px 40px;
  transition:background .4s,backdrop-filter .4s;
}
#nav.scrolled{
  background:rgba(28,26,23,0.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.nav-links{display:flex;gap:36px;align-items:center}
.nav-links.right{justify-content:flex-end}
.nav-links a{
  font-family:'Jost',sans-serif;
  font-size:11px;letter-spacing:3px;
  text-transform:uppercase;font-weight:400;
  color:var(--white);text-decoration:none;
  transition:color .2s;
}
#nav.hero-mode .nav-links a{color:var(--white)}
#nav.hero-mode .nav-brand{color:var(--white)}
.nav-links a:hover{color:var(--gold)}
.nav-brand{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:5px;
  text-transform:uppercase;font-weight:400;
  color:var(--white);text-decoration:none;
  text-align:center;line-height:1.5;
  transition:color .2s;
}
.nav-brand span{color:var(--gold)}
.nav-menu-btn{
  display:none;background:none;border:none;
  cursor:pointer;padding:4px;color:var(--white);
}
.nav-menu-btn svg{width:22px;height:16px}

/* ── HERO ── */
#hero{
  position:relative;width:100%;height:100vh;
  min-height:620px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:var(--ink);
}
#hero img.hero-bg{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center;z-index:0;
}
#hero::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(20,17,13,.45) 0%,rgba(20,17,13,.62) 100%);
  z-index:1;
}
.hero-body{
  position:relative;z-index:2;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
}
.hero-logo{
  width:clamp(180px,35vw,420px);
  height:auto;
  display:block;
}
.hero-cta{
  position:absolute;bottom:44px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  z-index:2;text-decoration:none;color:var(--white);
}
.hero-cta-label{font-family:'Jost',sans-serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;opacity:.8}
/* flecha animada SVG */
.hero-cta-arrow{width:20px;height:44px;display:flex;align-items:flex-start;justify-content:center}
.hero-cta-arrow svg{animation:arrowfall 1.8s ease-in-out infinite}
@keyframes arrowfall{
  0%{transform:translateY(-4px);opacity:.4}
  60%{transform:translateY(4px);opacity:1}
  100%{transform:translateY(-4px);opacity:.4}
}

/* ── SECCIONES BASE ── */
section{width:100%;padding:90px 6%;background:var(--ink);color:var(--white)}
.section-eyebrow{
  font-family:'Jost',sans-serif;
  font-size:10px;letter-spacing:5px;
  text-transform:uppercase;font-weight:400;
  color:rgba(255,255,255,.45);margin-bottom:14px;
}
.section-heading{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,5vw,3.8rem);
  font-weight:300;font-style:italic;
  color:var(--white);line-height:1.1;
  margin-bottom:50px;
}
.section-rule{
  width:40px;height:1px;
  background:var(--gold);
  margin-bottom:50px;
}

/* ── CARRUSEL ── */
#carrusel{background:#fff;padding:0;position:relative;overflow:hidden}
.carrusel-track-wrap{overflow:hidden;position:relative}
.carrusel-track{
  display:flex;
  gap:3px;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.carrusel-slide{
  flex:0 0 calc(33.333% - 2px);
  aspect-ratio:4/3;
  overflow:hidden;
  position:relative;
}
.carrusel-slide img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
}
.carrusel-slide:hover img{transform:scale(1.04)}
.carr-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  z-index:10;background:none;border:none;cursor:pointer;
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  opacity:.35;transition:opacity .2s;
}
.carr-btn:hover{opacity:.8}
.carr-btn svg{width:24px;height:24px}
.carr-prev{left:16px}
.carr-next{right:16px}

/* ── CONTACTO ── */
#contacto{background:var(--ink);padding:36px 6%}
#contacto .section-eyebrow{color:rgba(255,255,255,.45)}
.contacto-wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;align-items:center;
}
.contact-list{display:flex;flex-direction:column;gap:22px}
.contact-row{display:flex;align-items:center;gap:18px}
.contact-icon-wrap{
  width:40px;height:40px;border:1px solid rgba(255,255,255,.15);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:border-color .2s,background .2s;
}
.contact-row:hover .contact-icon-wrap{border-color:var(--gold);background:rgba(200,168,75,.08)}
.contact-icon-wrap svg{width:18px;height:18px}
.contact-detail{
  font-family:'Jost',sans-serif;
  font-size:.88rem;font-weight:300;
  color:rgba(255,255,255,.7);
}
.contact-detail a{color:inherit;text-decoration:none;transition:color .2s}
.contact-detail a:hover{color:var(--gold)}
.map-box{
  aspect-ratio:16/9;overflow:hidden;
  border:1px solid rgba(255,255,255,.1);
  filter:grayscale(30%) brightness(.85);
}
.map-box iframe{width:100%;height:100%;border:none;display:block}

/* ── WA FLOAT ── */
#wa{
  position:fixed;bottom:28px;right:28px;
  width:54px;height:54px;
  background:#25D366;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(37,211,102,.4);
  z-index:400;text-decoration:none;
  transition:transform .2s,box-shadow .2s;
}
#wa:hover{transform:scale(1.08);box-shadow:0 6px 26px rgba(37,211,102,.55)}
#wa svg{width:28px;height:28px}

/* ── MOBILE NAV DRAWER ── */
#drawer{
  position:fixed;inset:0;
  background:rgba(28,26,23,.97);
  z-index:300;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:32px;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.77,0,.18,1);
}
#drawer.open{transform:translateX(0)}
.drawer-close{
  position:absolute;top:22px;right:28px;
  background:none;border:none;cursor:pointer;
  font-size:26px;color:rgba(255,255,255,.6);
}
#drawer a{
  font-family:'Cormorant Garamond',serif;
  font-size:2.8rem;font-weight:300;font-style:italic;
  color:var(--white);text-decoration:none;letter-spacing:1px;
  transition:color .2s;
}
#drawer a:hover{color:var(--gold)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #nav{padding:18px 24px;grid-template-columns:1fr auto}
  .nav-links:not(.right){display:none}
  .nav-links.right{display:none}
  .nav-menu-btn{display:flex;align-items:center;justify-content:flex-end;width:100%}
  .nav-brand{text-align:left}
  .prod-mosaic{grid-template-columns:1fr 1fr;grid-template-rows:auto}
  .pm-horizontal{grid-column:1/3;aspect-ratio:16/7}
  .pm-vertical{grid-row:auto;grid-column:auto;aspect-ratio:1/1}
  .contacto-wrap{grid-template-columns:1fr;gap:32px}
  .map-box{aspect-ratio:16/9}
  .carrusel-slide{flex:0 0 calc(50% - 2px)}
}
@media(max-width:560px){
  section{padding:60px 5%}
  .prod-mosaic{grid-template-columns:1fr 1fr}
  .pm-horizontal{grid-column:1/3;aspect-ratio:16/8}
  .pm-vertical{grid-row:auto;grid-column:auto;aspect-ratio:1/1}
  .prod-panel{width:100%}
  .hero-logo{width:clamp(140px,70vw,280px)}
  .carrusel-slide{flex:0 0 calc(100% - 0px)}
}
</style>
</head>

<script>
// Nav scroll
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  if (window.scrollY > window.innerHeight - 80) {
    nav.classList.remove('hero-mode');
    nav.classList.add('scrolled');
  } else {
    nav.classList.add('hero-mode');
    nav.classList.remove('scrolled');
  }
});

// Mobile drawer
function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.body.style.overflow='hidden'; }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.body.style.overflow=''; }

// Carrusel
(function(){
  const track = document.getElementById('carr-track');
  const slides = track.querySelectorAll('.carrusel-slide');
  const total = slides.length;
  let current = 0;

  function getVisible(){
    const w = window.innerWidth;
    if(w <= 560) return 1;
    if(w <= 900) return 2;
    return 3;
  }

  function update(){
    const vis = getVisible();
    const pct = 100 / vis;
    slides.forEach(s => s.style.flex = `0 0 calc(${pct}% - 2px)`);
    const max = total - vis;
    if(current > max) current = max;
    if(current < 0) current = 0;
    track.style.transform = `translateX(calc(-${current * pct}% - ${current * 3}px))`;
  }

  window.carrMove = function(dir){
    const vis = getVisible();
    const max = total - vis;
    current = Math.max(0, Math.min(current + dir, max));
    update();
  };

  // Auto-avance lento
  let auto = setInterval(() => {
    const vis = getVisible();
    const max = total - vis;
    current = current >= max ? 0 : current + 1;
    update();
  }, 3200);

  track.parentElement.parentElement.addEventListener('mouseenter', () => clearInterval(auto));
  track.parentElement.parentElement.addEventListener('mouseleave', () => {
    auto = setInterval(() => {
      const vis = getVisible();
      const max = total - vis;
      current = current >= max ? 0 : current + 1;
      update();
    }, 3200);
  });

  window.addEventListener('resize', update);
  update();
})();
</script>
